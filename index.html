<!DOCTYPE html>
<html lang="ru">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 50%, #1a0a2e 0%, #0d0518 45%, #05020a 70%); font-family: 'Segoe UI', sans-serif; color: #d8f6ff; }

  /* TON 618 ФОН (всегда включён) */
  #ton618Bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: radial-gradient(circle at 50% 50%, #1a0a2e 0%, #0d0518 45%, #05020a 70%); }
  #accretionDisk {
    position: fixed; top: 50%; left: 50%; width: 80vmin; height: 80vmin; transform: translate(-50%,-50%); z-index: -1; border-radius: 50%; pointer-events: none;
    background: radial-gradient(ellipse at 30% 40%, rgba(122,92,255,0.25), transparent 70%), radial-gradient(ellipse at 70% 60%, rgba(181,155,255,0.15), transparent 60%), radial-gradient(ellipse at 40% 30%, rgba(255,178,56,0.08), transparent 50%), radial-gradient(ellipse at center, rgba(255,77,94,0.05), transparent 80%);
    animation: diskPulse 8s ease-in-out infinite; filter: blur(2px);
  }
  @keyframes diskPulse { 0% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 0.7; } 50% { transform: translate(-50%,-50%) scale(1.05) rotate(5deg); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 0.7; } }
  #accretionRing {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: -1; border-radius: 50%; pointer-events: none;
    border: 2px solid rgba(122,92,255,0.15); width: 90vmin; height: 90vmin; animation: ringRotate 25s linear infinite;
    box-shadow: 0 0 40px rgba(122,92,255,0.05), inset 0 0 40px rgba(122,92,255,0.03);
  }
  @keyframes ringRotate { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
  #blackHoleShadow {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: -1; border-radius: 50%; pointer-events: none;
    width: 30vmin; height: 30vmin; background: radial-gradient(circle at 40% 40%, rgba(5,2,10,0.9), #05020a);
    box-shadow: 0 0 60px rgba(5,2,10,0.9), 0 0 120px rgba(5,2,10,0.7), 0 0 200px rgba(5,2,10,0.5); filter: blur(4px);
    animation: shadowPulse 6s ease-in-out infinite;
  }
  @keyframes shadowPulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 50% { transform: translate(-50%,-50%) scale(1.02); opacity: 0.9; } }

  /* Остальные стили — минимум, без наложений */
  .grid-bg, .scanline, .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .grid-bg { background-image: linear-gradient(rgba(122,92,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(122,92,255,0.04) 1px, transparent 1px); background-size: 50px 50px; -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%); mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%); }
  .scanline { background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(122,92,255,0.03) 3px, rgba(122,92,255,0.03) 4px); z-index: 2; }
  .vignette { background: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%); z-index: 3; }

  main { position: relative; z-index: 10; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
  .core-wrap { position: relative; width: min(60vw,420px); height: min(60vw,420px); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s ease; transform-style: preserve-3d; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(122,92,255,0.35); }
  .ring.r1 { inset: 0; animation: spin 18s linear infinite; border-style: dashed; border-color: rgba(181,155,255,0.3); }
  .ring.r2 { inset: 9%; animation: spin 26s linear infinite reverse; border-color: rgba(122,92,255,0.5); }
  .ring.r3 { inset: 18%; animation: spin 12s linear infinite; border-top-color: #ffb238; border-right-color: transparent; border-bottom-color: transparent; border-left-color: transparent; }
  .ring.r4 { inset: 27%; animation: spin 20s linear infinite reverse; border-color: rgba(181,155,255,0.25); }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .core-center { position: relative; width: 34%; height: 34%; border-radius: 50%; background: radial-gradient(circle at 38% 32%, #ffffff 0%, #b59bff 22%, #7a5cff 52%, #1b0d3d 82%, transparent 100%); box-shadow: 0 0 30px 6px rgba(122,92,255,0.6), 0 0 80px 20px rgba(122,92,255,0.35), 0 0 140px 50px rgba(122,92,255,0.15), inset -6px -6px 16px rgba(0,0,0,0.35), inset 4px 4px 10px rgba(255,255,255,0.5); animation: pulseCore 2.6s ease-in-out infinite; }
  @keyframes pulseCore { 0%,100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.06); filter: brightness(1.25); } }

  .hud-panel { position: fixed; z-index: 12; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; background: linear-gradient(135deg, rgba(122,92,255,0.08), rgba(122,92,255,0.02)); border: 1px solid rgba(122,92,255,0.2); border-radius: 8px; padding: 6px 10px; backdrop-filter: blur(8px); }
  .hud-panel .label { font-size: 9px; color: rgba(181,155,255,0.5); }
  .hud-panel .value { font-size: 13px; color: #d8f6ff; text-shadow: 0 0 8px rgba(122,92,255,0.3); }
  .top-left { top: 16px; left: 16px; }
  .top-right { top: 16px; right: 16px; text-align: right; }
  .bottom-left { bottom: 60px; left: 16px; }
  .bottom-right { bottom: 60px; right: 16px; text-align: right; }

  .title-block { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 12; text-align: center; }
  .title-block .name { font-size: 20px; letter-spacing: 6px; font-weight: 300; background: linear-gradient(90deg, #b59bff, #ffffff 45%, #b59bff); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 30px rgba(122,92,255,0.7); }
  .title-block .sub { font-size: 9px; letter-spacing: 3px; color: rgba(181,155,255,0.5); margin-top: 2px; }

  .status-pill { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 12; font-size: 8px; letter-spacing: 2px; padding: 3px 10px; border: 1px solid rgba(122,92,255,0.3); border-radius: 12px; color: rgba(181,155,255,0.7); text-transform: uppercase; opacity: 0; transition: opacity 0.3s; background: rgba(3,10,16,0.4); backdrop-filter: blur(4px); }
  .status-pill.show { opacity: 1; }

  .response { position: fixed; top: calc(50% + 180px); left: 50%; transform: translateX(-50%); z-index: 12; width: min(90vw, 500px); text-align: center; font-size: 13px; color: #b59bff; min-height: 1.4em; }
  .response .cursor { display: inline-block; width: 6px; height: 12px; background: #7a5cff; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .mic-hint { position: fixed; top: calc(50% + 155px); left: 50%; transform: translateX(-50%); z-index: 12; font-size: 9px; letter-spacing: 2px; color: rgba(181,155,255,0.4); text-align: center; width: 260px; pointer-events: none; }

  .ctrl-row { position: fixed; bottom: 12px; left: 12px; z-index: 20; display: flex; gap: 6px; flex-wrap: wrap; max-width: calc(100vw - 24px); }
  .ctrl-btn { font-size: 9px; letter-spacing: 1px; padding: 4px 10px; border-radius: 14px; border: 1px solid rgba(122,92,255,0.25); background: rgba(3,10,16,0.5); color: rgba(181,155,255,0.6); cursor: pointer; text-transform: uppercase; backdrop-filter: blur(4px); transition: all 0.2s; }
  .ctrl-btn:hover { color: #7a5cff; border-color: #7a5cff; background: rgba(122,92,255,0.08); }
  .ctrl-btn.active { background: #7a5cff; color: #05020a; border-color: #7a5cff; }

  .text-input-wrap { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; gap: 6px; width: min(92vw, 420px); }
  .text-input-wrap input { flex: 1; background: rgba(3,10,16,0.7); border: 1px solid rgba(122,92,255,0.25); border-radius: 20px; padding: 8px 14px; color: #d8f6ff; font-size: 12px; outline: none; backdrop-filter: blur(4px); }
  .text-input-wrap input::placeholder { color: rgba(181,155,255,0.3); }
  .text-input-wrap input:focus { border-color: #7a5cff; box-shadow: 0 0 12px rgba(122,92,255,0.25); }
  .text-input-wrap button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(122,92,255,0.3); background: rgba(122,92,255,0.1); color: #7a5cff; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .text-input-wrap button:hover { background: #7a5cff; color: #05020a; }

  .credit { position: fixed; bottom: 8px; right: 14px; z-index: 20; font-size: 9px; letter-spacing: 1px; color: rgba(181,155,255,0.3); }
  .credit span { color: #7a5cff; text-shadow: 0 0 8px rgba(122,92,255,0.4); }

  .wave-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 12; display: flex; gap: 2px; height: 28px; align-items: flex-end; }
  .wave-wrap .bar { width: 2px; height: 4px; background: #7a5cff; border-radius: 2px; box-shadow: 0 0 6px rgba(122,92,255,0.5); }

  .side-data { display: none; } /* скрываем лишнее, чтобы не налазило */

  /* адаптация для телефона */
  @media (max-width: 480px) {
    .hud-panel { padding: 4px 8px; font-size: 9px; }
    .hud-panel .value { font-size: 11px; }
    .title-block .name { font-size: 16px; letter-spacing: 4px; }
    .title-block .sub { font-size: 8px; }
    .mic-hint { font-size: 8px; top: calc(50% + 145px); }
    .response { font-size: 12px; top: calc(50% + 170px); }
    .ctrl-btn { font-size: 8px; padding: 3px 8px; }
    .text-input-wrap { bottom: 46px; }
    .text-input-wrap input { font-size: 11px; padding: 6px 12px; }
  }
</style>

<body>

<!-- ====== TON 618 ФОН (всегда включён) ====== -->

<script>
// ============================================================
// БЕЗОПАСНАЯ ВЕРСИЯ — API-КЛЮЧ В CLOUDFLARE WORKER
// Worker: https://jarvis-proxy.egar3864.workers.dev
// ============================================================
const GEMINI_WORKER_URL = 'https://jarvis-proxy.egar3864.workers.dev';

// ---- Минимальный JS для работы голоса, таймера, заметок ----
let audioCtx = null;
let soundOn = true;
let recognition = null;
let listening = false;
let speaking = false;
let wakeMode = false;
let lastTopic = null;
const history = [];
const PRONOUN_RE = /\b(он|она|оно|они|его|её|ему|ей|им|них|нём|ней|этот|эта|это|тот|та)\b/i;

// ---- Web Audio ----
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(f=880, d=0.08, v=0.04) {
  if (!soundOn) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = f;
  g.gain.value = v;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
  o.start(); o.stop(audioCtx.currentTime + d + 0.02);
}

// ---- Голосовой вывод (speech) ----
let cachedVoices = [];
let voicesReady = false;
function loadVoices() {
  cachedVoices = speechSynthesis.getVoices();
  if (cachedVoices.length) voicesReady = true;
}
if ('speechSynthesis' in window) { loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

function speak(text) {
  speaking = true;
  typeText(text);
  if ('speechSynthesis' in window && soundOn) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ru-RU';
    utter.pitch = 0.85; utter.rate = 1.0;
    const ruVoice = cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('ru'));
    if (ruVoice) utter.voice = ruVoice;
    utter.onend = () => { speaking = false; };
    utter.onerror = () => { speaking = false; };
    speechSynthesis.cancel();
    setTimeout(() => speechSynthesis.speak(utter), 40);
  } else {
    setTimeout(() => { speaking = false; }, Math.min(3000, text.length * 60));
  }
}

// ---- Печать текста в ответе ----
const respEl = document.getElementById('response');
function typeText(text) {
  let i = 0;
  clearInterval(respEl._typeIv);
  function step() {
    respEl.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
    i++;
    if (i <= text.length) {
      respEl._typeIv = setTimeout(step, 26);
    }
  }
  step();
}

// ---- Wikipedia (резерв) ----
async function searchWikipedia(query) {
  const res = await fetch('https://ru.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(query), { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error('not found');
  const data = await res.json();
  if (data.type === 'disambiguation') throw new Error('ambiguous');
  return data.extract;
}

async function searchWikipediaFallback(query) {
  const res = await fetch('https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(query) + '&format=json&origin=*');
  const data = await res.json();
  const hit = data?.query?.search?.[0];
  if (!hit) throw new Error('no results');
  return searchWikipedia(hit.title);
}

// ---- Gemini через Worker ----
async function askGeminiWorker(prompt, imageData = null) {
  const contextHistory = history.slice(0, 6).slice().reverse().flatMap(h => [
    { role: 'user', parts: [{ text: h.q }] },
    { role: 'model', parts: [{ text: h.a }] }
  ]);
  let userParts = [{ text: prompt }];
  if (imageData) userParts.push({ inline_data: { mime_type: 'image/jpeg', data: imageData } });
  contextHistory.push({ role: 'user', parts: userParts });
  const payload = {
    contents: contextHistory,
    systemInstruction: { parts: [{ text: 'Ты — Джарвис. Отвечай кратко (1-3 предл.), по-русски, без markdown.' }] },
    generationConfig: { maxOutputTokens: 300, temperature: 0.7 }
  };
  const res = await fetch(GEMINI_WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  if (res.status === 429) throw new Error('QUOTA_EXCEEDED');
  if (!res.ok) throw new Error('Worker error: ' + res.status);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('empty response');
  return text;
}

// ---- Обработка запроса ----
async function craftReply(said) {
  const s = said.toLowerCase();
  if (s.includes('привет') || s.includes('здравств')) return 'Здравствуйте. Чем могу помочь?';
  if (s.includes('спасибо')) return 'Всегда рад помочь.';
  if (s.includes('кто ты') || s.includes('джарвис ты кто')) {
    return 'Я Джарвис — голосовой интерфейс с доступом к Gemini и Wikipedia.';
  }
  // Простые команды (заметки, таймер, время, погода)
  const rememberMatch = said.match(/^запомни[,]?\s+(.+)/i);
  if (rememberMatch) {
    try { localStorage.setItem('jarvis-note', rememberMatch[1].trim()); } catch(e) {}
    return 'Запомнил: «' + rememberMatch[1].trim() + '».';
  }
  if (/напомни|что я (просил )?запомнить|что я записал/i.test(s)) {
    const note = localStorage.getItem('jarvis-note');
    if (!note) return 'У меня нет сохранённых заметок.';
    return 'Вы просили запомнить: ' + note;
  }
  if (s.includes('время') && !s.includes('в')) return 'Сейчас ' + new Date().toLocaleTimeString('ru-RU') + '.';
  if (s.includes('погод')) {
    try {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
      const data = await res.json();
      const w = data.current_weather;
      const desc = { 0:'ясно',1:'преимущественно ясно',2:'переменная облачность',3:'пасмурно',45:'туман',61:'дождь',71:'снег',80:'ливень' }[w.weathercode] || 'переменные условия';
      return `Сейчас ${desc}, ${Math.round(w.temperature)}°C, ветер ${Math.round(w.windspeed)} км/ч.`;
    } catch(e) { return 'Не удалось получить погоду.'; }
  }

  let query = said.trim().replace(/^(джарвис[,]?\s*)/i,'').replace(/^(найди|что такое|кто такой|расскажи про|поищи|погугли)\s+/i,'').replace(/[?.!]+$/,'');
  if (!query || query.length < 2) return 'Не расслышал. Повторите, пожалуйста.';
  if (PRONOUN_RE.test(query) && lastTopic) query = lastTopic;

  try {
    const reply = await askGeminiWorker(said);
    lastTopic = query;
    return reply;
  } catch (err) {
    if (err.message === 'QUOTA_EXCEEDED') {
      const msg = 'Дневной лимит Gemini исчерпан. Переключаюсь на Wikipedia.';
      speak(msg);
      return msg;
    }
    // Wikipedia fallback
    try {
      let extract;
      try { extract = await searchWikipedia(query); }
      catch (e) { extract = await searchWikipediaFallback(query); }
      if (!extract) return 'Ничего не найдено по запросу.';
      lastTopic = query;
      return extract.length > 420 ? extract.slice(0, 420) + '..' : extract;
    } catch(e) {
      return 'Не удалось найти информацию.';
    }
  }
}

// ---- Обработка голоса / текста ----
async function handleUtterance(text) {
  const reply = await craftReply(text);
  history.unshift({ q: text, a: reply });
  if (history.length > 8) history.pop();
  speak(reply);
}

// ---- Кнопки и интерфейс ----
document.getElementById('muteBtn').addEventListener('click', e => {
  soundOn = !soundOn;
  e.textContent = 'Звук: ' + (soundOn ? 'вкл' : 'выкл');
  beep(700,0.06);
});

const textInput = document.getElementById('textInput');
const textSendBtn = document.getElementById('textSendBtn');
function submitText() {
  const val = textInput.value.trim();
  if (!val) return;
  textInput.value = '';
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (/^(стоп|замолчи|хватит)$/i.test(val)) { speechSynthesis.cancel(); return; }
  handleUtterance(val);
}
textSendBtn.addEventListener('click', submitText);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitText(); } });

// ---- Wake word ----
const wakeBtn = document.getElementById('wakeBtn');
const wakeWordInput = document.createElement('input');
wakeWordInput.type = 'text';
wakeWordInput.placeholder = 'Джарвис';
wakeWordInput.className = 'wake-input';
wakeWordInput.style.cssText = 'background:rgba(3,10,16,0.7);border:1px solid rgba(122,92,255,0.25);border-radius:14px;padding:2px 10px;color:#d8f6ff;font-size:9px;width:80px;outline:none;backdrop-filter:blur(4px);text-transform:uppercase;letter-spacing:1px;';
document.querySelector('.ctrl-row').appendChild(wakeWordInput);

if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onresult = (e) => {
    const result = e.results[e.results.length - 1];
    const transcript = result[0].transcript;
    if (!result.isFinal) {
      document.getElementById('statusPill').textContent = transcript.slice(0, 20) + '…';
      document.getElementById('statusPill').classList.add('show');
      return;
    }
    const wakeWord = wakeWordInput.value.trim() || 'джарвис';
    if (wakeMode) {
      if (!new RegExp(wakeWord, 'i').test(transcript)) return;
      const stripped = transcript.replace(new RegExp(`^.*?${wakeWord}[,.]?\\s*`, 'i'), '').trim();
      if (/^(стоп|замолчи|хватит)/i.test(stripped)) { speechSynthesis.cancel(); return; }
      handleUtterance(stripped || transcript);
    } else {
      handleUtterance(transcript);
    }
  };
  recognition.onend = () => { if (wakeMode) setTimeout(() => recognition.start(), 100); };
  recognition.onerror = (err) => {
    if (err.error === 'not-allowed') return;
    if (wakeMode && err.error !== 'no-speech') { setTimeout(() => recognition.start(), 500); }
  };
}

function startListening() {
  if (!recognition) { speak('Голосовой ввод не поддерживается.'); return; }
  listening = true;
  document.getElementById('core').classList.add('listening');
  document.getElementById('statusPill').textContent = 'Слушаю...';
  document.getElementById('statusPill').classList.add('show');
  beep(660,0.1); setTimeout(()=>beep(880,0.12), 100);
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  listening = false;
  document.getElementById('core').classList.remove('listening');
  document.getElementById('statusPill').classList.remove('show');
  try { recognition.stop(); } catch(e) {}
}

document.getElementById('core').addEventListener('click', () => {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (listening) { stopListening(); } else { startListening(); }
});

wakeBtn.addEventListener('click', () => {
  wakeMode = !wakeMode;
  wakeBtn.textContent = 'Wake: ' + (wakeMode ? 'вкл' : 'выкл');
  wakeBtn.classList.toggle('active', wakeMode);
  if (wakeMode) {
    initAudio();
    recognition.continuous = true;
    try { recognition.start(); } catch(e) {}
    document.getElementById('micHint').textContent = `скажи «${wakeWordInput.value.trim() || 'Джарвис'}» и вопрос`;
  } else {
    recognition.continuous = false;
    try { recognition.stop(); } catch(e) {}
    document.getElementById('micHint').textContent = 'нажми на ядро и говори';
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  history.length = 0;
  lastTopic = null;
  beep(500,0.08);
  document.getElementById('response').innerHTML = 'Диалог сброшен.';
  setTimeout(() => typeText(''), 1200);
});

// ---- Часы ----
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU');
}
setInterval(tick, 1000); tick();

// ---- Диагностика ----
setInterval(() => {
  document.getElementById('diag').textContent = (97 + Math.random() * 2.9).toFixed(1) + '%';
}, 1400);

// ---- Волны (визуализация) ----
const wave = document.getElementById('wave');
const waveBars = [];
for (let i = 0; i < 28; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  wave.appendChild(b);
  waveBars.push(b);
}

// ---- Старт ----
window.addEventListener('load', () => {
  setTimeout(() => {
    initAudio();
    speak('Здравствуйте. Система готова.');
  }, 700);
});
</script>
