<style>

<script>
// ============================================================
// 🔐 БЕЗОПАСНАЯ ВЕРСИЯ — API-КЛЮЧ В CLOUDFLARE WORKER
// Worker: https://jarvis-proxy.egar3864.workers.dev
// ============================================================
const GEMINI_WORKER_URL = 'https://jarvis-proxy.egar3864.workers.dev';

// ============================================================
// 🎯 ВСЕ ФУНКЦИИ (голос, фото, таймер, заметки, экспорт, кино)
// ============================================================

// ---- Состояние ----
let history = [];
let lastTopic = null;
let listening = false;
let wakeMode = false;
let speaking = false;
let cinemaMode = false;
let soundOn = true;
let audioCtx = null;
let recognition = null;
let lastPhotoData = null;
let resumeInterval = null;
let idleTimer = null;

const core = document.getElementById('core');
const respEl = document.getElementById('response');
const statusPill = document.getElementById('statusPill');
const PRONOUN_RE = /\b(он|она|оно|они|его|её|ему|ей|им|них|нём|ней|этот|эта|это|тот|та)\b/i;

// ---- Загрузка истории из localStorage ----
try {
  const saved = localStorage.getItem('jarvis-history');
  if (saved) history = JSON.parse(saved);
} catch(e) {}

// ---- Экспорт диалога ----
document.getElementById('exportBtn').addEventListener('click', () => {
  if (history.length === 0) {
    speak('История пуста.');
    return;
  }
  const text = history.map(h => `👤 ${h.q}\n🤖 ${h.a}`).join('\n\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jarvis-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  speak('История сохранена.');
});

// ---- Кинотеатр ----
document.getElementById('cinemaBtn').addEventListener('click', () => {
  cinemaMode = !cinemaMode;
  document.body.classList.toggle('cinema-mode', cinemaMode);
  document.getElementById('cinemaBtn').classList.toggle('active', cinemaMode);
  speak(cinemaMode ? 'Режим кинотеатра включён.' : 'Режим кинотеатра выключен.');
});

// ---- Голос TTS (выбор) ----
let ttsVoice = 'ru-RU';
document.getElementById('voiceBtn').addEventListener('click', () => {
  const voices = speechSynthesis.getVoices();
  const ru = voices.find(v => v.lang.startsWith('ru'));
  const en = voices.find(v => v.lang.startsWith('en'));
  if (ttsVoice === 'ru-RU') {
    ttsVoice = 'en-US';
    document.getElementById('voiceBtn').classList.add('active');
    speak('Переключено на английский голос.');
  } else {
    ttsVoice = 'ru-RU';
    document.getElementById('voiceBtn').classList.remove('active');
    speak('Переключено на русский голос.');
  }
});

// ---- Web Audio ----
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(f=880, d=0.08, v=0.04) {
  if (!soundOn) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = f;
  g.gain.value = v;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
  o.start(); o.stop(audioCtx.currentTime + d + 0.02);
}

function chime() {
  beep(660,0.1,0.05);
  setTimeout(()=>beep(880,0.14,0.05),90);
  setTimeout(()=>beep(1180,0.18,0.04),180);
}

document.getElementById('muteBtn').addEventListener('click', e => {
  soundOn = !soundOn;
  e.textContent = 'Звук: ' + (soundOn ? 'вкл' : 'выкл');
  if (soundOn) beep(700,0.06);
});

// ---- Голосовой вывод ----
let cachedVoices = [];
let voicesReady = false;
function loadVoices() {
  cachedVoices = speechSynthesis.getVoices();
  if (cachedVoices.length) voicesReady = true;
}
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  clearTimeout(idleTimer);
  speaking = true;
  typeText(text);
  if ('speechSynthesis' in window && soundOn) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = ttsVoice;
    utter.pitch = 0.9; utter.rate = 1.0;
    const voice = cachedVoices.find(v => v.lang.startsWith(ttsVoice.slice(0,2)));
    if (voice) utter.voice = voice;
    utter.onend = () => { speaking = false; };
    utter.onerror = () => { speaking = false; };
    speechSynthesis.cancel();
    setTimeout(() => speechSynthesis.speak(utter), 40);
  } else {
    setTimeout(() => { speaking = false; }, Math.min(3000, text.length * 60));
  }
}

// ---- Печать текста ----
function typeText(text) {
  let i = 0;
  clearInterval(respEl._typeIv);
  function step() {
    respEl.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
    i++;
    if (i <= text.length) {
      respEl._typeIv = setTimeout(step, 28);
    }
  }
  step();
}

function eraseText(onDone) {
  clearInterval(respEl._typeIv);
  let text = respEl.textContent;
  let i = text.length;
  function step() {
    if (i > 0) {
      i--;
      respEl.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
      setTimeout(step, 12);
    } else if (onDone) { onDone(); }
  }
  step();
}

function idleLoop() {
  const phrases = [
    'Система готова к работе.',
    'Ожидание команд.',
    'Уровень мощности стабилен.',
    'Все системы функционируют штатно.'
  ];
  if (speaking || listening) return;
  const text = phrases[Math.floor(Math.random() * phrases.length)];
  typeText(text);
  idleTimer = setTimeout(() => eraseText(() => {
    idleTimer = setTimeout(idleLoop, 3000 + Math.random() * 3000);
  }), 2500);
}

// ---- Wikipedia (резерв) ----
async function searchWikipedia(query) {
  const res = await fetch('https://ru.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(query), { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error('not found');
  const data = await res.json();
  if (data.type === 'disambiguation') throw new Error('ambiguous');
  return data.extract;
}

async function searchWikipediaFallback(query) {
  const res = await fetch('https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(query) + '&format=json&origin=*');
  const data = await res.json();
  const hit = data?.query?.search?.[0];
  if (!hit) throw new Error('no results');
  return searchWikipedia(hit.title);
}

// ---- Gemini через Worker ----
async function askGeminiWorker(prompt, imageData = null) {
  const contextHistory = history.slice(0, 6).slice().reverse().flatMap(h => [
    { role: 'user', parts: [{ text: h.q }] },
    { role: 'model', parts: [{ text: h.a }] }
  ]);
  let userParts = [{ text: prompt }];
  if (imageData) userParts.push({ inline_data: { mime_type: 'image/jpeg', data: imageData } });
  contextHistory.push({ role: 'user', parts: userParts });
  const payload = {
    contents: contextHistory,
    systemInstruction: { parts: [{ text: 'Ты — Джарвис. Отвечай кратко (1-3 предл.), по-русски, без markdown.' }] },
    generationConfig: { maxOutputTokens: 300, temperature: 0.7 }
  };
  const res = await fetch(GEMINI_WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  if (res.status === 429) throw new Error('QUOTA_EXCEEDED');
  if (!res.ok) throw new Error('Worker error: ' + res.status);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('empty response');
  return text;
}

// ---- Заметки ----
function loadNotes() { try { return JSON.parse(localStorage.getItem('jarvisNotes') || '[]'); } catch(e) { return []; } }
function saveNote(text) {
  const notes = loadNotes();
  notes.push(text);
  try { localStorage.setItem('jarvisNotes', JSON.stringify(notes)); } catch(e) {}
}

// ---- Погода, время, город ----
async function getWeather() {
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
    const data = await res.json();
    const w = data.current_weather;
    const codes = { 0:'ясно',1:'преим. ясно',2:'переменная облачность',3:'пасмурно',45:'туман',61:'дождь',71:'снег',80:'ливень' };
    const desc = codes[w.weathercode] || 'переменные условия';
    return `Сейчас ${desc}, ${Math.round(w.temperature)}°C, ветер ${Math.round(w.windspeed)} км/ч.`;
  } catch(e) { return 'Не удалось получить погоду.'; }
}

function getTimeInCity(city) {
  const tzMap = {
    'москва':'Europe/Moscow','лондон':'Europe/London','нью-йорк':'America/New_York',
    'токио':'Asia/Tokyo','париж':'Europe/Paris','берлин':'Europe/Berlin','дубай':'Asia/Dubai'
  };
  const tz = tzMap[city.toLowerCase()] || 'Europe/Moscow';
  return new Intl.DateTimeFormat('ru-RU', { hour: '2-digit', minute: '2-digit', timeZone: tz }).format(new Date());
}

// ---- Определение языка ----
function detectLanguage(text) {
  return /[а-яё]/i.test(text) ? 'ru' : 'en';
}

// ---- Основная логика ответа ----
async function craftReply(said) {
  const s = said.toLowerCase();
  if (s.includes('привет') || s.includes('здравств')) return 'Здравствуйте. Чем могу помочь?';
  if (s.includes('спасибо')) return 'Всегда рад помочь.';
  if (s.includes('кто ты') || s.includes('джарвис ты кто')) return 'Я Джарвис — голосовой интерфейс с доступом к Gemini и Wikipedia.';
  if (s.includes('что ты умеешь')) return 'Я умею: отвечать на вопросы, показывать погоду, переводить, ставить таймер, запоминать заметки и распознавать фото.';

  // Заметки
  const rememberMatch = said.match(/^запомни[,]?\s+(.+)/i);
  if (rememberMatch) { saveNote(rememberMatch[1].trim()); return 'Запомнил: «' + rememberMatch[1].trim() + '».'; }
  if (/напомни|что я (просил )?запомнить/.test(s)) {
    const notes = loadNotes();
    return notes.length ? 'Вы просили запомнить: ' + notes.slice(-3).join('; ') : 'У меня нет сохранённых заметок.';
  }

  if (s.includes('погод')) return await getWeather();
  if (s.includes('время') && s.includes('в ')) {
    const city = s.match(/в\s+([а-яё\-]+)/i);
    if (city) return 'В этом городе ' + getTimeInCity(city[1]);
  }
  if (s.includes('время')) return 'Сейчас ' + new Date().toLocaleTimeString('ru-RU') + '.';

  // Таймер
  const timerMatch = s.match(/(?:поставь|заведи)\s+таймер\s+на\s+(\d+)\s+(секунд|минут|час)/i);
  if (timerMatch) {
    const num = parseInt(timerMatch[1]);
    const unit = timerMatch[2];
    let ms = num * (unit === 'секунд' ? 1000 : unit === 'минут' ? 60000 : 3600000);
    core.classList.add('thinking');
    setTimeout(() => { core.classList.remove('thinking'); speak('Время вышло!'); }, ms);
    return `Таймер установлен на ${num} ${unit}.`;
  }

  let query = said.trim().replace(/^(джарвис[,]?\s*)/i,'').replace(/^(найди|что такое|кто такой|расскажи про|поищи|погугли)\s+/i,'').replace(/[?.!]+$/,'');
  if (!query || query.length < 2) return 'Не расслышал. Повторите, пожалуйста.';
  if (PRONOUN_RE.test(query) && lastTopic) query = lastTopic;

  try {
    const reply = await askGeminiWorker(said);
    lastTopic = query;
    history.push({ q: said, a: reply });
    if (history.length > 12) history.shift();
    try { localStorage.setItem('jarvis-history', JSON.stringify(history)); } catch(e) {}
    return reply;
  } catch (err) {
    if (err.message === 'QUOTA_EXCEEDED') {
      const msg = 'Дневной лимит Gemini исчерпан. Переключаюсь на Wikipedia.';
      speak(msg);
      return msg;
    }
    try {
      let extract;
      try { extract = await searchWikipedia(query); }
      catch (e) { extract = await searchWikipediaFallback(query); }
      if (!extract) return 'Ничего не найдено по запросу.';
      lastTopic = query;
      history.push({ q: said, a: extract.slice(0, 420) });
      try { localStorage.setItem('jarvis-history', JSON.stringify(history)); } catch(e) {}
      return extract.length > 420 ? extract.slice(0, 420) + '..' : extract;
    } catch(e) { return 'Не удалось найти информацию.'; }
  }
}

// ---- Обработка ввода ----
async function handleUtterance(text) {
  const reply = await craftReply(text);
  speak(reply);
}

// ---- Text input ----
document.getElementById('textSendBtn').addEventListener('click', () => {
  const val = document.getElementById('textInput').value.trim();
  if (!val) return;
  document.getElementById('textInput').value = '';
  handleUtterance(val);
});
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('textSendBtn').click(); }
});

// ---- Wake word ----
const wakeBtn = document.getElementById('wakeBtn');
const wakeWordInput = document.createElement('input');
wakeWordInput.type = 'text';
wakeWordInput.placeholder = 'Джарвис';
wakeWordInput.className = 'wake-input';
wakeWordInput.style.cssText = 'background:rgba(3,10,16,0.4);border:1px solid rgba(79,216,255,0.1);border-radius:30px;padding:2px 12px;color:#d8f6ff;font-size:10px;width:90px;outline:none;text-transform:uppercase;letter-spacing:1px;backdrop-filter:blur(2px);';
document.querySelector('.ctrl-row').appendChild(wakeWordInput);

if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;

  recognition.onresult = (e) => {
    const result = e.results[e.results.length - 1];
    const transcript = result[0].transcript;
    if (!result.isFinal) {
      statusPill.textContent = transcript.slice(0, 24) + '…';
      statusPill.classList.add('show');
      return;
    }
    const wakeWord = wakeWordInput.value.trim() || 'джарвис';
    if (wakeMode) {
      if (!new RegExp(wakeWord, 'i').test(transcript)) return;
      const stripped = transcript.replace(new RegExp(`^.*?${wakeWord}[,.]?\\s*`, 'i'), '').trim();
      if (/^(стоп|замолчи|хватит)/i.test(stripped)) { speechSynthesis.cancel(); return; }
      handleUtterance(stripped || transcript);
    } else {
      handleUtterance(transcript);
    }
    statusPill.classList.remove('show');
  };
  recognition.onend = () => { if (wakeMode) setTimeout(() => recognition.start(), 100); };
  recognition.onerror = (err) => {
    if (err.error === 'not-allowed') return;
    if (wakeMode && err.error !== 'no-speech') setTimeout(() => recognition.start(), 500);
  };
}

function startListening() {
  if (!recognition) { speak('Голосовой ввод не поддерживается.'); return; }
  listening = true;
  core.classList.add('listening');
  statusPill.textContent = 'Слушаю...';
  statusPill.classList.add('show', 'listening');
  chime();
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  listening = false;
  core.classList.remove('listening');
  statusPill.classList.remove('show', 'listening');
  try { recognition.stop(); } catch(e) {}
}

core.addEventListener('click', () => {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (listening) { stopListening(); } else { startListening(); }
});

wakeBtn.addEventListener('click', () => {
  wakeMode = !wakeMode;
  wakeBtn.textContent = 'Wake: ' + (wakeMode ? 'вкл' : 'выкл');
  wakeBtn.classList.toggle('active', wakeMode);
  if (wakeMode) {
    initAudio();
    recognition.continuous = true;
    try { recognition.start(); } catch(e) {}
    document.getElementById('micHint').textContent = `скажи «${wakeWordInput.value.trim() || 'Джарвис'}» и вопрос`;
  } else {
    recognition.continuous = false;
    try { recognition.stop(); } catch(e) {}
    document.getElementById('micHint').textContent = 'нажми на ядро и говори';
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  history = [];
  lastTopic = null;
  try { localStorage.setItem('jarvis-history', JSON.stringify(history)); } catch(e) {}
  beep(500,0.08);
  document.getElementById('response').innerHTML = 'Диалог сброшен.';
  setTimeout(() => typeText(''), 1200);
});

// ---- Часы ----
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU');
}
setInterval(tick, 1000); tick();

// ---- Диагностика ----
setInterval(() => {
  document.getElementById('diag').textContent = (97 + Math.random() * 2.9).toFixed(1) + '%';
}, 1400);

// ---- Волны ----
const wave = document.getElementById('wave');
const waveBars = [];
for (let i = 0; i < 28; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  wave.appendChild(b);
  waveBars.push(b);
}
setInterval(() => {
  waveBars.forEach((bar, i) => {
    if (listening || speaking) {
      const h = 6 + Math.sin(Date.now() / 200 + i) * 12 + Math.random() * 8;
      bar.style.height = Math.max(6, h) + 'px';
    } else {
      bar.style.height = '6px';
    }
  });
}, 60);

// ---- Звёзды ----
(function initStars() {
  const canvas = document.getElementById('starfield');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width * canvas.height) / 8000);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.4 + 0.1,
      speed: Math.random() * 0.01 + 0.003,
      phase: Math.random() * Math.PI * 2
    }));
  }
  resize();
  window.addEventListener('resize', resize);
  let t = 0;
  function draw() {
    t += 1;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a + Math.sin(t * s.speed + s.phase) * 0.15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,235,255,${Math.max(0, alpha)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ---- Батарея ----
if ('getBattery' in navigator) {
  navigator.getBattery().then(b => {
    const el = document.getElementById('batteryVal');
    function update() {
      const pct = Math.round(b.level * 100);
      el.textContent = `${pct}% ${b.charging ? '⚡' : ''}`;
      el.style.color = pct < 20 && !b.charging ? '#ff4d5e' : '#d8f6ff';
    }
    update();
    b.addEventListener('levelchange', update);
    b.addEventListener('chargingchange', update);
  });
}

// ---- Инициализация ----
window.addEventListener('load', () => {
  setTimeout(() => {
    initAudio();
    chime();
    const savedHistory = localStorage.getItem('jarvis-history');
    if (savedHistory) {
      try { history = JSON.parse(savedHistory); } catch(e) {}
      if (history.length) speak('Здравствуйте. История загружена.');
    }
    if (!history.length) speak('Здравствуйте. Система готова.');
    idleLoop();
  }, 700);
});
