<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>J.A.R.V.I.S.</title>
<style>
  :root{
    --bg:#020409;
    --blue:#4fd8ff;
    --blue-dim:#0d3550;
    --blue-soft:#8fe8ff;
    --amber:#ffb238;
    --red:#ff4d5e;
    --fg:#d8f6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:radial-gradient(ellipse at center, #061420 0%, #020409 70%);
    color:var(--fg);
    font-family:'Segoe UI', ui-sans-serif, system-ui, sans-serif;
    height:100%; overflow:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important;}
  }

  .grid-bg{
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(79,216,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,216,255,0.05) 1px, transparent 1px);
    background-size:42px 42px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 0%, transparent 72%);
    mask-image:radial-gradient(ellipse at center, black 0%, transparent 72%);
  }

  .vignette{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
  }
  .scanline{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(79,216,255,0.03) 3px, rgba(79,216,255,0.03) 4px);
  }

  main{
    position:relative; z-index:10;
    height:100vh; width:100vw;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---- Central core (arc reactor style) ---- */
  .core-wrap{
    position:relative; width:min(60vw,420px); height:min(60vw,420px);
    display:flex; align-items:center; justify-content:center;
  }
  .ring{
    position:absolute; border-radius:50%;
    border:1px solid rgba(79,216,255,0.35);
  }
  .ring.r1{ inset:0; animation:spin 18s linear infinite; border-style:dashed; }
  .ring.r2{ inset:9%; animation:spin 26s linear infinite reverse; border-color:rgba(79,216,255,0.5); }
  .ring.r3{ inset:18%; animation:spin 12s linear infinite; border-top-color:var(--blue); border-right-color:transparent; border-bottom-color:transparent; border-left-color:transparent; }
  .ring.r4{ inset:27%; animation:spin 20s linear infinite reverse; border-color:rgba(143,232,255,0.25); }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .tick-ring{
    position:absolute; inset:2%; border-radius:50%;
  }
  .tick{
    position:absolute; left:50%; top:0; width:2px; height:8px;
    background:rgba(79,216,255,0.4);
    transform-origin:1px 210px;
  }

  .core-center{
    position:relative; width:34%; height:34%; border-radius:50%;
    background:radial-gradient(circle, #dfffff 0%, var(--blue-soft) 25%, var(--blue) 55%, transparent 78%);
    box-shadow:
      0 0 30px 6px rgba(79,216,255,0.6),
      0 0 80px 20px rgba(79,216,255,0.35),
      0 0 140px 50px rgba(79,216,255,0.15);
    animation:pulseCore 2.6s ease-in-out infinite;
  }
  @keyframes pulseCore{
    0%,100%{ transform:scale(1); filter:brightness(1); }
    50%{ transform:scale(1.06); filter:brightness(1.25); }
  }
  .core-center::after{
    content:''; position:absolute; inset:-4px; border-radius:50%;
    border:1px solid rgba(255,255,255,0.5);
  }

  /* ---- HUD panels ---- */
  .hud-panel{
    position:fixed; z-index:12;
    font-size:11px; letter-spacing:1.5px; color:var(--blue-soft);
    text-transform:uppercase;
  }
  .hud-panel .label{ color:rgba(79,216,255,0.55); font-size:10px; margin-bottom:4px;}
  .hud-panel .value{ font-size:15px; color:var(--fg); letter-spacing:1px; }

  .top-left{ top:26px; left:28px; }
  .top-right{ top:26px; right:28px; text-align:right; }
  .bottom-left{ bottom:70px; left:28px; }
  .bottom-right{ bottom:70px; right:28px; text-align:right; }

  .corner-frame{
    position:fixed; z-index:11; width:70px; height:70px;
    border:1.5px solid var(--blue);
    opacity:0.7;
  }
  .corner-frame.tl{ top:14px; left:14px; border-right:none; border-bottom:none; }
  .corner-frame.tr{ top:14px; right:14px; border-left:none; border-bottom:none; }
  .corner-frame.bl{ bottom:14px; left:14px; border-right:none; border-top:none; }
  .corner-frame.br{ bottom:14px; right:14px; border-left:none; border-top:none; }

  /* ---- title ---- */
  .title-block{
    position:fixed; top:26px; left:50%; transform:translateX(-50%);
    z-index:12; text-align:center;
  }
  .title-block .name{
    font-size:22px; letter-spacing:8px; font-weight:300;
    color:var(--fg); text-shadow:0 0 14px rgba(79,216,255,0.6);
  }
  .title-block .sub{
    font-size:10px; letter-spacing:4px; color:rgba(79,216,255,0.55);
    margin-top:4px;
  }

  /* ---- waveform ---- */
  .wave-wrap{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:12; display:flex; align-items:flex-end; gap:3px; height:34px;
  }
  .wave-wrap .bar{
    width:3px; background:var(--blue); border-radius:2px;
    box-shadow:0 0 6px rgba(79,216,255,0.7);
    animation:wave 1.2s ease-in-out infinite;
  }

  @keyframes wave{
    0%,100%{ height:6px; opacity:0.5;}
    50%{ height:28px; opacity:1;}
  }

  /* ---- response line ---- */
  .response{
    position:fixed; top:calc(50% + 190px); left:50%; transform:translateX(-50%);
    z-index:12; width:min(90vw,560px); text-align:center;
    font-size:14px; color:var(--blue-soft); letter-spacing:0.5px;
    min-height:1.6em;
  }
  .response .cursor{
    display:inline-block; width:7px; height:14px; background:var(--blue);
    vertical-align:middle; animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .credit{
    position:fixed; bottom:14px; right:20px; z-index:20;
    font-size:10px; letter-spacing:2px; color:rgba(79,216,255,0.35);
    text-transform:uppercase;
  }
  .credit span{ color:var(--blue); text-shadow:0 0 8px rgba(79,216,255,0.6); }

  .core-wrap{ cursor:pointer; }
  .core-wrap.listening .core-center{
    animation:pulseCoreFast 0.9s ease-in-out infinite;
    box-shadow:
      0 0 40px 10px rgba(255,77,94,0.55),
      0 0 100px 30px rgba(255,77,94,0.3),
      0 0 160px 60px rgba(255,77,94,0.12);
  }
  .core-wrap.listening .core-center{
    background:radial-gradient(circle, #fff 0%, #ffb7bd 20%, var(--red) 55%, transparent 78%);
  }
  @keyframes pulseCoreFast{
    0%,100%{ transform:scale(1); filter:brightness(1); }
    50%{ transform:scale(1.12); filter:brightness(1.35); }
  }
  .core-wrap.listening .ring.r3{ border-top-color:var(--red); }

  .mic-hint{
    position:fixed; top:calc(50% + 165px); left:50%; transform:translateX(-50%);
    z-index:12; font-size:10px; letter-spacing:3px; color:rgba(79,216,255,0.4);
    text-transform:uppercase; text-align:center; width:260px;
  }

  .status-pill{
    position:fixed; top:66px; left:50%; transform:translateX(-50%);
    z-index:12; font-size:9px; letter-spacing:3px;
    padding:4px 12px; border:1px solid rgba(79,216,255,0.35);
    border-radius:20px; color:rgba(79,216,255,0.6);
    text-transform:uppercase; opacity:0; transition:opacity 0.3s;
  }
  .status-pill.show{ opacity:1; }
  .status-pill.listening{ color:var(--red); border-color:rgba(255,77,94,0.5); }

  .mute-btn{
    position:fixed; bottom:16px; left:20px; z-index:20;
    font-size:10px; letter-spacing:2px; color:rgba(79,216,255,0.5);
    border:1px solid rgba(79,216,255,0.3); background:transparent;
    padding:6px 12px; border-radius:4px; cursor:pointer;
    text-transform:uppercase; font-family:inherit;
  }
  .mute-btn:hover{ color:var(--blue); border-color:var(--blue); }

  /* ---- particles around core ---- */
  .particle-field{
    position:absolute; inset:-15%; z-index:1; pointer-events:none;
  }
  .particle{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--blue-soft);
    box-shadow:0 0 6px rgba(79,216,255,0.8);
    animation:orbit linear infinite;
  }
  @keyframes orbit{
    from{ transform:rotate(0deg) translateX(var(--r)) rotate(0deg); }
    to{ transform:rotate(360deg) translateX(var(--r)) rotate(-360deg); }
  }

  /* ---- radar sweep ---- */
  .radar{
    position:absolute; inset:-6%; z-index:2; border-radius:50%;
    overflow:hidden; pointer-events:none;
  }
  .radar::before{
    content:''; position:absolute; inset:0;
    background:conic-gradient(from 0deg, rgba(79,216,255,0.35), transparent 25%);
    animation:radarSpin 4s linear infinite;
  }
  @keyframes radarSpin{ to{ transform:rotate(360deg); } }

  /* ---- side data panels ---- */
  .side-data{
    position:fixed; top:50%; transform:translateY(-50%);
    z-index:12; display:flex; flex-direction:column; gap:10px;
    width:150px;
  }
  .side-data.left{ left:22px; }
  .side-data.right{ right:22px; align-items:flex-end; text-align:right; }
  @media (max-width:760px){ .side-data{ display:none; } }

  .data-row{ font-size:9px; letter-spacing:1.5px; color:rgba(79,216,255,0.45); text-transform:uppercase; }
  .data-bar{
    width:100%; height:3px; background:rgba(79,216,255,0.12); margin-top:4px; border-radius:2px; overflow:hidden;
  }
  .data-bar > div{ height:100%; background:var(--blue); box-shadow:0 0 6px rgba(79,216,255,0.6); }

  /* ---- search flash on core when fetching ---- */
  .core-wrap.thinking .ring.r2{ border-color:var(--amber); animation-duration:3s; }
  .core-wrap.thinking .core-center{
    background:radial-gradient(circle, #fffbe0 0%, #ffe6a3 20%, var(--amber) 55%, transparent 78%);
    box-shadow:
      0 0 40px 10px rgba(255,178,56,0.5),
      0 0 100px 30px rgba(255,178,56,0.28);
  }

  ::selection{background:var(--blue); color:#02121c;}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="vignette"></div>

<div class="corner-frame tl"></div>
<div class="corner-frame tr"></div>
<div class="corner-frame bl"></div>
<div class="corner-frame br"></div>

<div class="title-block">
  <div class="name">J.A.R.V.I.S.</div>
  <div class="sub">just a rather very intelligent system</div>
</div>

<div class="status-pill" id="statusPill">Ожидание</div>

<div class="hud-panel top-left">
  <div class="label">Диагностика</div>
  <div class="value" id="diag">98.6%</div>
</div>
<div class="hud-panel top-right">
  <div class="label">Время</div>
  <div class="value" id="clock">00:00:00</div>
</div>
<div class="hud-panel bottom-left">
  <div class="label">Мощность реактора</div>
  <div class="value">STABLE</div>
</div>
<div class="hud-panel bottom-right">
  <div class="label">Статус</div>
  <div class="value">ОНЛАЙН</div>
</div>

<div class="side-data left">
  <div class="data-row">Ядро <span id="loadPct">62%</span>
    <div class="data-bar"><div id="loadBar" style="width:62%"></div></div>
  </div>
  <div class="data-row">Сеть <span id="netPct">88%</span>
    <div class="data-bar"><div id="netBar" style="width:88%"></div></div>
  </div>
  <div class="data-row">Память <span id="memPct">41%</span>
    <div class="data-bar"><div id="memBar" style="width:41%"></div></div>
  </div>
</div>
<div class="side-data right">
  <div class="data-row">Источник <span id="srcVal">WIKIPEDIA</span></div>
  <div class="data-row">Задержка <span id="latVal">12ms</span></div>
  <div class="data-row">Запросов <span id="reqVal">0</span></div>
</div>

<main>
  <div class="core-wrap" id="core">
    <div class="particle-field" id="particles"></div>
    <div class="radar"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
    <svg class="tick-ring" viewBox="0 0 420 420" id="ticksvg"></svg>
    <div class="core-center"></div>
  </div>
</main>

<div class="mic-hint">нажми на ядро и говори</div>
<div class="response" id="response"><span class="cursor"></span></div>

<div class="wave-wrap" id="wave"></div>

<button class="mute-btn" id="muteBtn">Звук: вкл</button>
<div class="credit">by <span>@newince</span> | verifactor</div>

<script>
// ---- Web Audio: ambient hum + UI beeps ----
let audioCtx = null;
let hum, humGain;
let soundOn = true;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ambient reactor hum: two detuned oscillators
  humGain = audioCtx.createGain();
  humGain.gain.value = 0.035;
  humGain.connect(audioCtx.destination);

  const o1 = audioCtx.createOscillator();
  o1.type = 'sine'; o1.frequency.value = 82;
  const o2 = audioCtx.createOscillator();
  o2.type = 'sine'; o2.frequency.value = 82.7;
  o1.connect(humGain); o2.connect(humGain);
  o1.start(); o2.start();
  hum = [o1,o2];
}

function beep(freq=880, dur=0.08, type='sine', vol=0.06){
  if(!soundOn) return;
  initAudio();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.value = vol;
  osc.connect(g); g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.start(now);
  osc.stop(now + dur + 0.02);
}

function chime(){
  beep(660,0.1,'sine',0.05);
  setTimeout(()=>beep(880,0.14,'sine',0.05), 90);
  setTimeout(()=>beep(1180,0.18,'sine',0.04), 180);
}

document.getElementById('muteBtn').addEventListener('click', (e)=>{
  soundOn = !soundOn;
  e.target.textContent = 'Звук: ' + (soundOn ? 'вкл' : 'выкл');
  if(humGain) humGain.gain.value = soundOn ? 0.035 : 0;
  if(soundOn) beep(700,0.06);
});

// ---- orbiting particles ----
const pField = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'particle';
  const r = 140 + Math.random()*90;
  const dur = 6 + Math.random()*10;
  const delay = -Math.random()*dur;
  p.style.setProperty('--r', r+'px');
  p.style.top = '50%'; p.style.left = '50%';
  p.style.animationDuration = dur+'s';
  p.style.animationDelay = delay+'s';
  p.style.opacity = (0.3 + Math.random()*0.6).toFixed(2);
  pField.appendChild(p);
}

// ---- side data panel jitter ----
function jitterBar(barId, pctId, base, range){
  setInterval(()=>{
    const v = Math.max(4, Math.min(100, base + (Math.random()*range - range/2)));
    document.getElementById(barId).style.width = v.toFixed(0)+'%';
    document.getElementById(pctId).textContent = v.toFixed(0)+'%';
  }, 1600 + Math.random()*800);
}
jitterBar('loadBar','loadPct',62,20);
jitterBar('netBar','netPct',88,10);
jitterBar('memBar','memPct',41,16);

let reqCount = 0;
function bumpReq(){
  reqCount++;
  const el = document.getElementById('reqVal');
  if(el) el.textContent = reqCount;
  const lat = document.getElementById('latVal');
  if(lat) lat.textContent = (80 + Math.floor(Math.random()*160)) + 'ms';
}

// ---- clock ----
function tick(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('ru-RU');
}
setInterval(tick,1000); tick();

// ---- diagnostics jitter ----
setInterval(()=>{
  const v = (97 + Math.random()*2.9).toFixed(1);
  document.getElementById('diag').textContent = v + '%';
}, 1400);

// ---- tick ring (radial marks like an instrument dial) ----
const svg = document.getElementById('ticksvg');
const cx = 210, cy = 210, rOuter = 205, rInner = 192;
for(let i=0;i<72;i++){
  const angle = (i/72) * Math.PI * 2;
  const long = i % 6 === 0;
  const rI = long ? rInner - 10 : rInner;
  const x1 = cx + rOuter*Math.cos(angle);
  const y1 = cy + rOuter*Math.sin(angle);
  const x2 = cx + rI*Math.cos(angle);
  const y2 = cy + rI*Math.sin(angle);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('stroke', long ? 'rgba(79,216,255,0.75)' : 'rgba(79,216,255,0.25)');
  line.setAttribute('stroke-width', long ? 1.6 : 1);
  svg.appendChild(line);
}

// ---- waveform bars ----
const wave = document.getElementById('wave');
const waveBars = [];
for(let i=0;i<28;i++){
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.animationDelay = (Math.random()*1.2).toFixed(2)+'s';
  b.style.animationDuration = (0.8 + Math.random()*0.8).toFixed(2)+'s';
  wave.appendChild(b);
  waveBars.push(b);
}
function setWaveActive(active){
  waveBars.forEach(b=>{
    b.style.animationPlayState = active ? 'running' : 'paused';
    b.style.background = active ? 'var(--red)' : 'var(--blue)';
  });
}

// ---- idle typed phrases ----
const idlePhrases = [
  "Доброе утро. Все systems функционируют штатно.",
  "Диагностика завершена. Аномалий не обнаружено.",
  "Ожидаю дальнейших указаний.",
  "Уровень мощности стабилен на отметке 100%.",
  "Сканирование окружения завершено."
];
const respEl = document.getElementById('response');
const statusPill = document.getElementById('statusPill');
let pi = 0;
let idleTimer = null;
let speaking = false;

function showStatus(text, listening){
  statusPill.textContent = text;
  statusPill.classList.add('show');
  statusPill.classList.toggle('listening', !!listening);
}
function hideStatusSoon(){
  setTimeout(()=> statusPill.classList.remove('show'), 1800);
}

function typeText(text, onDone){
  let i = 0;
  clearInterval(respEl._typeIv);
  function step(){
    respEl.innerHTML = text.slice(0,i) + '<span class="cursor"></span>';
    i++;
    if(i <= text.length){ setTimeout(step, 26); }
    else if(onDone){ onDone(); }
  }
  step();
}
function eraseText(onDone){
  let text = respEl.textContent;
  let i = text.length;
  function step(){
    if(i > 0){
      i--;
      respEl.innerHTML = text.slice(0,i) + '<span class="cursor"></span>';
      setTimeout(step, 12);
    } else if(onDone){ onDone(); }
  }
  step();
}

function idleLoop(){
  if(speaking) return;
  const text = idlePhrases[pi % idlePhrases.length];
  typeText(text, ()=>{
    idleTimer = setTimeout(()=> eraseText(()=>{
      pi++;
      idleTimer = setTimeout(idleLoop, 500);
    }), 2600);
  });
}
idleLoop();

// ---- Озвучка (Исправленная версия для полной речи) ----
function speak(text){
  clearTimeout(idleTimer);
  speaking = true;
  setWaveActive(true);
  typeText(text);

  if('speechSynthesis' in window && soundOn){
    // Принудительно будим аудио-контекст на мобильных устройствах
    if(audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ru-RU';
    utter.pitch = 0.9;  // Слегка футуристичный тон
    utter.rate = 1.05;  // Естественная скорость

    // Ищем русский голос в системе
    const voices = speechSynthesis.getVoices();
    const ruVoice = voices.find(v => v.lang && v.lang.startsWith('ru'));
    if(ruVoice) utter.voice = ruVoice;

    utter.onend = finishSpeaking;
    utter.onerror = () => finishSpeaking();

    speechSynthesis.cancel(); // Сбрасываем старую очередь, если она зависла
    speechSynthesis.speak(utter);
  } else {
    setTimeout(finishSpeaking, Math.min(4000, text.length * 60));
  }
}

function finishSpeaking(){
  speaking = false;
  setWaveActive(false);
  showStatus('Ожидание');
  hideStatusSoon();
  idleTimer = setTimeout(()=> eraseText(()=>{ pi++; idleLoop(); }), 3000);
}

// ---- Исправленная обрезка текста (чтобы не пропадали буквы) ----
function trimForSpeech(text, maxLen){
  if (text.length <= maxLen) return text;
  // Аккуратно обрезаем по длине пробела, чтобы не ломать слова
  const cut = text.slice(0, maxLen);
  const lastSpace = cut.lastIndexOf(' ');
  return (lastSpace > 50 ? cut.slice(0, lastSpace) : cut) + '...';
}

// ---- real search via Wikipedia REST API (no key needed, CORS-open) ----
function extractQuery(said){
  let s = said.trim();
  s = s.replace(/^(джарвис[,]?\s*)/i, '');
  s = s.replace(/^(найди( мне)?|что такое|кто такой|кто такая|расскажи( мне)? про|расскажи( мне)? о|поищи( информацию)?( про| о)?|погугли|информация о)\s+/i, '');
  s = s.replace(/[?.!]+$/,'');
  return s.trim();
}

async function searchWikipedia(query){
  const endpoint = 'https://ru.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(query);
  const res = await fetch(endpoint, { headers: { 'Accept': 'application/json' } });
  if(!res.ok) throw new Error('not found');
  const data = await res.json();
  if(data.type === 'disambiguation') throw new Error('ambiguous');
  return data.extract;
}

async function searchWikipediaFallback(query){
  const searchEndpoint = 'https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=' +
    encodeURIComponent(query) + '&format=json&origin=*';
  const res = await fetch(searchEndpoint);
  const data = await res.json();
  const hit = data?.query?.search?.[0];
  if(!hit) throw new Error('no results');
  return searchWikipedia(hit.title);
}

async function craftReply(said){
  const s = said.toLowerCase();
  if(s.includes('привет') || s.includes('здравств')) return 'Здравствуйте. Чем могу помочь?';
  if(s.includes('время') || s.includes('который час')) return 'Сейчас ' + new Date().toLocaleTimeString('ru-RU') + '.';
  if(s.includes('как дела') || (s.includes('статус') && s.length < 20)) return 'Все системы функционируют в штатном режиме.';
  if(s.includes('спасибо')) return 'Всегда рад помочь.';
  if(s.includes('кто ты') || s.includes('джарвис ты кто')) return 'Я Джарвис — голосовой интерфейс с доступом к Википедии.';

  const query = extractQuery(said);
  if(!query) return 'Не расслышал тему запроса. Повторите, пожалуйста.';

  showStatus('Поиск...', false);
  document.getElementById('core').classList.add('thinking');
  document.getElementById('srcVal').textContent = 'WIKIPEDIA';
  bumpReq();

  try{
    let extract;
    try{ extract = await searchWikipedia(query); }
    catch(e){ extract = await searchWikipediaFallback(query); }
    document.getElementById('core').classList.remove('thinking');
    if(!extract) return 'По этому запросу ничего не найдено.';
    return trimForSpeech(extract, 420);
  }catch(err){
    document.getElementById('core').classList.remove('thinking');
    return 'Не удалось найти информацию по запросу «' + query + '».';
  }
}

// ---- speech recognition (voice input) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;
if(SR){
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e)=>{
    const said = e.results[0][0].transcript;
    showStatus('Обработка...');
    setTimeout(async ()=>{
      const reply = await craftReply(said);
      speak(reply);
    }, 250);
  };
  recognition.onerror = ()=>{
    stopListening();
    speak('Не удалось распознать голос. Попробуйте ещё раз.');
  };
  recognition.onend = ()=>{
    stopListening();
  };
}

function startListening(){
  if(!recognition){
    speak('Голосовой ввод не поддерживается этим браузером.');
    return;
  }
  initAudio();
  listening = true;
  core.classList.add('listening');
  showStatus('Слушаю...', true);
  chime();
  try{ recognition.start(); }catch(e){}
}
function stopListening(){
  listening = false;
  core.classList.remove('listening');
}

const core = document.getElementById('core');
core.addEventListener('click', ()=>{
  initAudio();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(listening){
    recognition && recognition.stop();
    stopListening();
  } else {
    startListening();
  }
});

// warm greeting on first load
window.addEventListener('load', ()=>{
  setTimeout(()=>{ initAudio(); chime(); speak('Здравствуйте. Все системы онлайн.'); }, 700);
});
</script>
